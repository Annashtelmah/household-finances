<div class="content container px-5 mb-5" id="page-content-wrapper">
  <header class="offset-y"></header>
  <div class="fw-medium px-2 mx-1 pb-3 mb-1">
    <h1 class="fs-1 fw-medium mb-0">Редактирование категории доходов</h1>
  </div>
  <form class="container px-2 mx-1 pt-3 mt-1">
    <div class="row">
      <div class="col-12 col-lg-6 col-xl-5">
        <input
          type="text"
          class="form-control"
          id="income"
          placeholder="Категория"
          value="Зарплата"
          required=""
        />
        <div id="income-error" class="error invalid-feedback">
          Введите категорию
        </div>
      </div>
    </div>
    <div class="row pt-3 mt-1">
      <div class="d-flex mb-1 align-items-center">
        <button type="button" class="btn btn-lg btn-success  fs-14">
          Сохранить
        </button>
        <button
          type="button"
          class="btn btn-lg btn-danger ms-2 fs-14"
           id="cancel"
        >
          Отмена
        </button>
      </div>
    </div>
  </form>
  <div class="offset-y"></div>
</div>
